<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form>
        <p>
            Name:<input type="text" placeholder="Keerthi"><br>
            Age:<input type="number" placeholder="20"><br>
            Email:<input type="mail" placeholder="1234@gmail.com"><br>
            Gender:<input type="radio" name="gender" id="1">Male
            <input type="radio" name="gender" id="2" >Female <br>
            Qualification:<input type="checkbox" name="qualification" id="1">10<sub>th</sub>
            <input type="checkbox" name="qualification" id="2">12<sub>th</sub>
            <input type="checkbox" name="qualification" id="3">degree
            <input type="checkbox" name="qualification" id="4">Masters<br>
            password:<input type="password" placeholder="Keerthi123"><br>
            Date:<input type="date"><br>
            Time:<input type="datetime-local"><br>
            Files:<input type="file">
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>

        </p>
    </form>
    <header></header>
    <div id="1">c</div>
    <div id="2">python</div>
    <label for="Name">java</label>
    <footer>6</footer>
    
</body>
</html>
