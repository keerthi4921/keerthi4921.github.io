<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive form</title>
    <link rel="stylesheet" href="form.css"> 
    <head>
<style>

.container{
    display: flex;
    align-items: flex-start;
    gap: 50px;
}

.image img{
    width: 200px;
    border: 2px solid black;
}

</style>
</head>
    
</head>
<div>
  <h1>Driving License</h1>
  <form id="details">
    <label >Name:</label>
    <input type="text" id="name" required>
    <br><br>
    <label>email:</label>
    <input type="email" id="email"required><br><br>
    <label>Phone number:</label>
    <input type="number"id="Phone"required><br><br>
    <label>D.O.B:</label>
    <input type="data" id="dob">
    <label>age:</label>
    <input type="number"id="age"required><br><br>
    <label>gender:</label>
    <input type="radio" name="gender" id="male"value="male" required>male
    <input type="radio" name="gender" id="female"value="female" >female
    <input type="radio" name="gender" id="not to mention"value="not to mention" >not to mention
    <br>
    <label>Verified</label>
    <input type="checkbox"name="documents"value="RC">RC
    <input type="checkbox"name="documents"value="Insurance">Insurance
    <input type="checkbox"name="documents"value="Pollution Control">Pollution Control
    <br>

    <label>address:</label>
    <input type="text"id="address"required><br><br>
        <label>photo:</label>
    <input type="file"id="image" accept="image/* required"><br><br>
    <button type="submit">Submit</button>
    
  </form>  
  <div class="container">
  <div class="text">
  <h2>License Details </h2>
  <p id="p1"></p>
  <p id="p2"></p>
  <p id="p3"></p>
  <p id="p4"></p>
  <p id="p5"></p>
  <p id="p6"></p>
  <p id="p7"></p>
  
  </div>
  <div class="image">
  <img id="dp" width="200px">
</div>
</div>
  <script src="form.js"></script>
</body>
</html>
